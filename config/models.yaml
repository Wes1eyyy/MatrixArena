# MatrixArena Model Pool Configuration
#
# All models are routed through OpenRouter via litellm.
# litellm convention: "openrouter/<provider>/<model-slug>"
# Requires: OPENROUTER_API_KEY in .env
# OpenRouter model catalog: https://openrouter.ai/models

models:
  - id: openrouter/anthropic/claude-opus-4.6
    provider: openrouter
    display_name: Claude Opus 4.6
    api_key_env: OPENROUTER_API_KEY

  - id: openrouter/google/gemini-3-flash-preview
    provider: openrouter
    display_name: Gemini 3 Flash
    api_key_env: OPENROUTER_API_KEY

  - id: openrouter/x-ai/grok-4.1-fast
    provider: openrouter
    display_name: Grok 4.1 Fast
    api_key_env: OPENROUTER_API_KEY

  - id: openrouter/openai/gpt-5.3-codex
    provider: openrouter
    display_name: GPT-5.3 Codex
    api_key_env: OPENROUTER_API_KEY

  # Alibaba Bailian (百联) — OpenAI-compatible endpoint (Coding Plan)
  # Base URL: https://coding.dashscope.aliyuncs.com/v1
  - id: openai/qwen3.5-plus
    provider: bailian
    display_name: Qwen3.5 Plus
    api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key_env: BAILIAN_API_KEY

  - id: openai/MiniMax-M2.5
    provider: bailian
    display_name: MiniMax M2.5
    api_base: https://coding.dashscope.aliyuncs.com/v1
    api_key_env: BAILIAN_CODING_PLAN_API_KEY

  - id: openai/kimi-k2.5
    provider: bailian
    display_name: Kimi K2.5
    api_base: https://coding.dashscope.aliyuncs.com/v1
    api_key_env: BAILIAN_CODING_PLAN_API_KEY

  # ByteDance Ark — OpenAI-compatible endpoint (Coding Plan)
  # Base URL: https://ark.cn-beijing.volces.com/api/coding/v3
  # Supported model names: doubao-seed-2.0-code, minimax-m2.5, glm-4.7, deepseek-v3.2, kimi-k2.5
  - id: openai/doubao-seed-2.0-code
    provider: ark
    display_name: Doubao Seed 2.0 Code
    api_base: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key_env: ARK_CODING_PLAN_API_KEY

  - id: openai/deepseek-v3-2-251201
    provider: ark
    display_name: DeepSeek V3.2
    api_base: https://ark.cn-beijing.volces.com/api/v3
    api_key_env: ARK_API_KEY

  - id: openai/glm-4-7-251222
    provider: ark
    display_name: GLM 4.7
    api_base: https://ark.cn-beijing.volces.com/api/v3
    api_key_env: ARK_API_KEY

# Starting Elo rating assigned to every new model
initial_elo: 1200
